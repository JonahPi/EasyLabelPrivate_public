<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>EasyLabel Home</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#2e7d32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
    <header>
        <button id="back-btn" class="back-btn hidden" aria-label="Zurück">&#8592;</button>
        <span id="page-title">EasyLabel Home</span>
        <div id="status-dot" class="status-dot" title="MQTT-Verbindung"></div>
        <span id="printer-status" class="printer-status">Printer ?</span>
        <button id="settings-btn" class="settings-btn" aria-label="Einstellungen">&#9881;</button>
    </header>
    <div id="status-bar" class="status-bar">Verbinde...</div>
    <main id="app"></main>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
